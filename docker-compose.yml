services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bookingdojo
      POSTGRES_USER: bookingdojo
      POSTGRES_PASSWORD: bookingdojo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookingdojo -d bookingdojo"]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=ssm
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
