version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bookingdojo
      POSTGRES_USER: bookingdojo
      POSTGRES_PASSWORD: bookingdojo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookingdojo -d bookingdojo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
